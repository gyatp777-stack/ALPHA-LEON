<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Montserrat',sans-serif;background:#0b0b0b;color:white;}
header {display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:#111;}
header h1 {color:#ff2a2a;font-size:26px;}
nav a {color:white;margin:0 10px;text-decoration:none;font-size:14px;}
.hero {padding:60px 30px;background:linear-gradient(180deg,#1a0000,#000);}
.hero h2 {color:#ff2a2a;font-size:32px;}
.section {padding:30px;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.card {background:#121212;border-radius:12px;overflow:hidden;}
.card iframe {width:100%;height:180px;border:none;}
.card-content {padding:15px;}
.card h3 {margin:0;color:#ff2a2a;}
.badge {display:inline-block;background:#ff2a2a;padding:3px 8px;font-size:12px;border-radius:4px;margin-bottom:8px;}
button {width:100%;margin-top:10px;padding:10px;border:none;background:#ff2a2a;color:white;border-radius:6px;cursor:pointer;}
.timer {text-align:center;margin-top:8px;font-size:14px;}
.completed {outline:2px solid #00ff88;}
footer {text-align:center;padding:20px;background:#111;color:#aaa;}
</style>
</head>
<body>

<header>
<h1>ALPHA</h1>
<nav>
<a href="#home">Home</a>
<a href="#homework">Home</a>
<a href="#gym">Gym</a>
</nav>
</header>

<section class="hero" id="home">
<h2>Full Body Training</h2>
<p>Clean. Powerful. Focused.</p>
</section>

<section class="section" id="homework">
<h2>Home Workout</h2>
<div class="grid">

<div class="card" id="h1">
<iframe src="https://www.youtube.com/embed/IODxDxX7oi4"></iframe>
<div class="card-content">
<span class="badge">Chest</span>
<h3>Push Ups</h3>
<button onclick="timer('h1',30)">Start</button>
<div class="timer" id="t-h1"></div>
<button onclick="done('h1')">Complete</button>
</div>
</div>

<div class="card" id="h2">
<iframe src="https://www.youtube.com/embed/pSHjTRCQxIw"></iframe>
<div class="card-content">
<span class="badge">Core</span>
<h3>Plank</h3>
<button onclick="timer('h2',30)">Start</button>
<div class="timer" id="t-h2"></div>
<button onclick="done('h2')">Complete</button>
</div>
</div>

</div>
</section>

<section class="section" id="gym">
<h2>Gym Workout</h2>
<div class="grid">

<div class="card" id="g1">
<iframe src="https://www.youtube.com/embed/gRVjAtPip0Y"></iframe>
<div class="card-content">
<span class="badge">Chest</span>
<h3>Bench Press</h3>
<button onclick="timer('g1',40)">Start</button>
<div class="timer" id="t-g1"></div>
<button onclick="done('g1')">Complete</button>
</div>
</div>

<div class="card" id="g2">
<iframe src="https://www.youtube.com/embed/op9kVnSso6Q"></iframe>
<div class="card-content">
<span class="badge">Full Body</span>
<h3>Deadlift</h3>
<button onclick="timer('g2',40)">Start</button>
<div class="timer" id="t-g2"></div>
<button onclick="done('g2')">Complete</button>
</div>
</div>

</div>
</section>

<footer>
<p>ALPHA Training System</p>
</footer>

<script>
function timer(id,s){
let t=s;
let el=document.getElementById('t-'+id);
let i=setInterval(()=>{
el.innerText=t+'s';t--;
if(t<0){clearInterval(i);el.innerText='Done';}
},1000);
}

function done(id){
localStorage.setItem(id,'1');
document.getElementById(id).classList.add('completed');
}

window.onload=()=>{
['h1','h2','g1','g2'].forEach(id=>{
if(localStorage.getItem(id)){
document.getElementById(id).classList.add('completed');
}
});
}
</script>

</body>
</html>
