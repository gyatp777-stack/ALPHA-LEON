<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA GOD MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Orbitron',sans-serif;background:black;color:white;overflow-x:hidden;}
header {background:#0a0a0a;padding:20px;text-align:center;border-bottom:2px solid red;}
header h1 {color:red;font-size:44px;letter-spacing:5px;text-shadow:0 0 15px red;}
nav {display:flex;justify-content:center;gap:30px;margin-top:10px;}
nav a {color:white;text-decoration:none;font-weight:bold;transition:0.3s;}
nav a:hover {color:red;text-shadow:0 0 10px red;}
.hero {text-align:center;padding:100px;background:radial-gradient(circle,#300000,black);animation:fadeIn 2s ease-in-out;}
.hero h2 {font-size:45px;color:red;text-shadow:0 0 20px red;}
.hero p {font-size:18px;opacity:0.8;}
.section {padding:60px;}
.cards {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
.card {background:#111;padding:25px;border-radius:15px;border:1px solid red;box-shadow:0 0 15px rgba(255,0,0,0.6);transition:0.4s;}
.card:hover {transform:scale(1.08);box-shadow:0 0 30px red;}
.card h3 {color:red;}
button {background:red;color:white;border:none;padding:12px 25px;margin-top:10px;cursor:pointer;font-weight:bold;transition:0.3s;}
button:hover {background:#ff1a1a;box-shadow:0 0 10px red;}
footer {text-align:center;padding:20px;background:#0a0a0a;margin-top:20px;}
.lang {position:absolute;top:20px;right:20px;}
.progress {background:#222;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress-bar {height:10px;background:red;width:50%;}
@keyframes fadeIn {from{opacity:0;} to{opacity:1;}}
</style>
</head>
<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="en">EN</option>
<option value="es">ES</option>
</select>
</div>

<header>
<h1>ALPHA GOD 🦁</h1>
<nav>
<a href="#plans">Plans</a>
<a href="#exercises">Exercises</a>
<a href="#progress">Progress</a>
</nav>
</header>

<section class="hero">
<h2 id="title">UNLEASH YOUR POWER</h2>
<p id="subtitle">Train harder than everyone. Become unstoppable.</p>
</section>

<section id="plans" class="section">
<h2>Elite Plans</h2>
<div class="cards">
<div class="card"><h3>Starter</h3><p>$5</p><button>Join</button></div>
<div class="card"><h3>Warrior</h3><p>$10</p><button>Join</button></div>
<div class="card"><h3>GOD MODE</h3><p>$20</p><button>Join</button></div>
</div>
</section>

<section id="exercises" class="section">
<h2>Full Training</h2>
<div class="cards">
<div class="card">
<h3>Push Ups</h3>
<p>Chest, shoulders, triceps</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/IODxDxX7oi4"></iframe>
</div>
<div class="card">
<h3>Squats</h3>
<p>Legs, glutes</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/aclHkVaku9U"></iframe>
</div>
</div>
</section>

<section id="progress" class="section">
<h2>Your Progress</h2>
<p>Strength Level</p>
<div class="progress"><div class="progress-bar"></div></div>
</section>

<footer>
<p>© 2026 ALPHA GOD</p>
</footer>

<script>
function changeLang(lang){
if(lang==='es'){
document.getElementById('title').innerText='LIBERA TU PODER';
document.getElementById('subtitle').innerText='Entrena más duro que todos.';
}
if(lang==='en'){
document.getElementById('title').innerText='UNLEASH YOUR POWER';
document.getElementById('subtitle').innerText='Train harder than everyone.';
}
}
</script>

</body>
</html>
