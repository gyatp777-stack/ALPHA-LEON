<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA Fitness</title>
<style>
body {margin:0;font-family:Arial;background:black;color:white;}
header {background:#0a0a0a;padding:20px;text-align:center;border-bottom:2px solid red;}
header h1 {color:red;font-size:40px;letter-spacing:3px;}
nav {display:flex;justify-content:center;gap:20px;margin-top:10px;}
nav a {color:white;text-decoration:none;font-weight:bold;}
.hero {text-align:center;padding:60px;background:linear-gradient(black, #200000);}
.hero h2 {font-size:36px;color:red;}
.section {padding:40px;}
.cards {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card {background:#111;padding:20px;border-radius:10px;border:1px solid red;}
.card h3 {color:red;}
button {background:red;color:white;border:none;padding:10px 20px;margin-top:10px;cursor:pointer;}
footer {text-align:center;padding:20px;background:#0a0a0a;margin-top:20px;}
.lang {position:absolute;top:20px;right:20px;}
</style>
</head>
<body>

<div class="lang">
<select onchange="changeLang(this.value)">
<option value="en">EN</option>
<option value="es">ES</option>
</select>
</div>

<header>
<h1>ALPHA 🦁</h1>
<nav>
<a href="#plans">Plans</a>
<a href="#exercises">Exercises</a>
</nav>
</header>

<section class="hero">
<h2 id="title">Train Like an Alpha</h2>
<p id="subtitle">No excuses. Only results.</p>
</section>

<section id="plans" class="section">
<h2>Plans</h2>
<div class="cards">
<div class="card">
<h3>Basic</h3>
<p>$5/month</p>
<p>Access to basic routines</p>
<button>Join</button>
</div>
<div class="card">
<h3>Premium</h3>
<p>$10/month</p>
<p>All exercises + videos</p>
<button>Join</button>
</div>
</div>
</section>

<section id="exercises" class="section">
<h2>Exercises</h2>
<div class="cards">
<div class="card">
<h3>Push Ups</h3>
<p>Works chest, shoulders, triceps</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/IODxDxX7oi4"></iframe>
</div>
<div class="card">
<h3>Squats</h3>
<p>Works legs and glutes</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/aclHkVaku9U"></iframe>
</div>
</div>
</section>

<footer>
<p>© 2026 ALPHA Fitness</p>
</footer>

<script>
function changeLang(lang){
if(lang==='es'){
document.getElementById('title').innerText='Entrena como un Alpha';
document.getElementById('subtitle').innerText='Sin excusas. Solo resultados.';
}
if(lang==='en'){
document.getElementById('title').innerText='Train Like an Alpha';
document.getElementById('subtitle').innerText='No excuses. Only results.';
}
}
</script>

</body>
</html>
