<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA GOD PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Orbitron',sans-serif;background:black;color:white;}
header {background:#0a0a0a;padding:20px;text-align:center;border-bottom:2px solid red;}
header img {width:80px;display:block;margin:0 auto 10px;}
header h1 {color:red;font-size:42px;letter-spacing:4px;text-shadow:0 0 15px red;}
.hero {text-align:center;padding:80px;background:radial-gradient(circle,#300000,black);}
.hero h2 {color:red;text-shadow:0 0 20px red;}
.section {padding:40px;}
.cards {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card {background:#111;padding:20px;border-radius:10px;border:1px solid red;box-shadow:0 0 10px red;}
.card.completed {border:2px solid lime;box-shadow:0 0 15px lime;}
button {background:red;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer;}
.timer {font-size:18px;margin-top:10px;}
footer {text-align:center;padding:20px;background:#0a0a0a;}
</style>
</head>
<body>

<header>
<img src="https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg" alt="lion">
<h1>ALPHA GOD 🦁</h1>
</header>

<section class="hero">
<h2>TRACK YOUR POWER</h2>
<p>Complete workouts. Dominate your progress.</p>
</section>

<section class="section">
<h2>Exercises</h2>
<div class="cards">

<div class="card" id="pushup">
<h3>Push Ups</h3>
<p>Chest, shoulders, triceps</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/IODxDxX7oi4"></iframe>
<button onclick="startTimer('pushup',30)">Start 30s</button>
<div class="timer" id="timer-pushup"></div>
<button onclick="completeExercise('pushup')">Mark Complete</button>
</div>

<div class="card" id="squat">
<h3>Squats</h3>
<p>Legs, glutes</p>
<iframe width="100%" height="150" src="https://www.youtube.com/embed/aclHkVaku9U"></iframe>
<button onclick="startTimer('squat',30)">Start 30s</button>
<div class="timer" id="timer-squat"></div>
<button onclick="completeExercise('squat')">Mark Complete</button>
</div>

</div>
</section>

<footer>
<p>© 2026 ALPHA GOD</p>
</footer>

<script>
function startTimer(id, seconds){
let timerDisplay = document.getElementById('timer-'+id);
let time = seconds;
let interval = setInterval(()=>{
 timerDisplay.innerText = 'Time: '+time+'s';
 time--;
 if(time < 0){
  clearInterval(interval);
  timerDisplay.innerText = 'Done ✔';
 }
},1000);
}

function completeExercise(id){
localStorage.setItem(id,'done');
document.getElementById(id).classList.add('completed');
}

window.onload = function(){
['pushup','squat'].forEach(id=>{
 if(localStorage.getItem(id)==='done'){
  document.getElementById(id).classList.add('completed');
 }
});
}
</script>

</body>
</html>
